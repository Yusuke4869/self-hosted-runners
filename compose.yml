services:
  worker:
    user: root
    platform: linux/x86_64
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - kv-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always
    environment:
      - KV_PATH=/app/data/kv.sqlite3
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:?required}
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN:?required}
      - JOB_POLL_INTERVAL_MS=${JOB_POLL_INTERVAL_MS:-5000}
      - JOB_ASSIGN_LEASE_MS=${JOB_ASSIGN_LEASE_MS:-900000}
      - RESOURCE_CPU_THRESHOLD=${RESOURCE_CPU_THRESHOLD:-75}
      - RESOURCE_MEMORY_THRESHOLD=${RESOURCE_MEMORY_THRESHOLD:-75}

volumes:
  kv-data:
