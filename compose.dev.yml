services:
  worker-dev:
    user: root
    platform: linux/x86_64
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /app
    restart: unless-stopped
    command: deno task dev:worker
    environment:
      - KV_PATH=${KV_PATH:-/app/data/worker/dev.sqlite3}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:?required}
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN:?required}
      - JOB_POLL_INTERVAL_MS=${JOB_POLL_INTERVAL_MS:-5000}
      - JOB_ASSIGN_LEASE_MS=${JOB_ASSIGN_LEASE_MS:-900000}
      - RESOURCE_CPU_THRESHOLD=${RESOURCE_CPU_THRESHOLD:-90}
      - RESOURCE_MEMORY_THRESHOLD=${RESOURCE_MEMORY_THRESHOLD:-90}
